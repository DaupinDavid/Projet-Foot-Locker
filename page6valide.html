<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation - Foot Locker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo-section">
      <div class="logo-placeholder">
        <img src="images/logo.png" alt="Foot Locker Logo" class="logo-image">
      </div>
      <h1 class="logo-text">FOOT LOCKER</h1>
    </div>

    <div class="checkmark-container">
      <div class="checkmark-circle">
        <div class="checkmark"></div>
      </div>
    </div>

    <div class="content">
      <h2 class="main-title">C'EST VALIDÉ !</h2>
      <p class="subtitle">Un email de confirmation a été envoyé.</p>
      <p class="subtitle-secondary">Votre choix est enregistré.</p>
    </div>

    <div class="button-container">
      <a href="index.html" class="return-button">RETOUR SUR LA PAGE D'ACCUEIL</a>
    </div>
  </div>
</body>
</html>
