<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL Unboxed – Ouverture</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="page-ouverture" id="page-ouverture">

  <div class="jeu">

    <!-- Néons -->
    <div class="neon-rouge"></div>
    <div class="neon-magenta"></div>
    <div class="neon-cyan"></div>
    <div class="neon-vert"></div>

    <div class="logo-conteneur">
      <div class="logo-icone">
        <img src="./images/Logo Foot Locker Style 3.png" alt="Logo Foot Locker" class="img-logo">
      </div>
      <div class="logo-texte">FL Unboxed</div>
    </div>

    <!-- Croix + Cadeau -->
    <div class="croix">
      <div class="ligne-x-1"></div>
      <div class="ligne-x-2"></div>
      <div class="ligne-horizontale"></div>
      <div class="ligne-verticale"></div>
      <div class="coin haut-gauche"></div>
      <div class="coin haut-droite"></div>
      <div class="coin bas-gauche"></div>
      <div class="coin bas-droite"></div>

      <div class="boite-mystere" id="boite-mystere">
        <img src="./images/Boite1.png" alt="Boîte Mystère Foot Locker" class="img-boite">
      </div>

      <!-- Message d'ouverture -->
      <div class="ouverture-chargement">
        Ouverture en cours
        <span class="points-chargement">
          <span class="point-chargement"></span>
          <span class="point-chargement"></span>
          <span class="point-chargement"></span>
        </span>
      </div>
    </div>
  </div>

  <script src="./js/animation-page4.js"></script>
</body>

</html>
